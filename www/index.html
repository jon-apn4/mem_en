<!DOCTYPE html>
<!-- saved from url=(0031)https://jon-apn4.github.io/mem/ -->
<html lang="ja">
<head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="メモ帳">
  <meta name="theme-color" content="#1C1C1E">
  <link rel="manifest" href="https://jon-apn4.github.io/mem/manifest.json">
  <link rel="apple-touch-icon" href="https://jon-apn4.github.io/mem/icon-192.svg">
  <title>メモ帳</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#1C1C1E; --hd:#2C2C2E; --hover:#3A3A3C; --border:#3A3A3C;
      --accent:#FFD60A; --text:#F2F2F7; --muted:#8E8E93; --danger:#FF453A;
      --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
      --list-fs:18px; --editor-fs:18px; --row-min-h:36px;
    }
    html,body { height:100%; background:var(--bg); color:var(--text);
      font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
      -webkit-text-size-adjust:100%; overscroll-behavior:none; }
    #app { display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

    /* ── HEADER ── */
    header { display:flex; align-items:center; gap:6px;
      padding:calc(10px + var(--safe-top)) 10px 10px;
      background:var(--hd); border-bottom:1px solid var(--border); flex-shrink:0; }
    #header-title { flex-shrink:0; font-size:15px; font-weight:700; text-align:left;
      white-space:nowrap; }
    #header-actions { flex:1; min-width:0; display:flex; align-items:center; justify-content:flex-end;
      gap:5px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    #header-actions::-webkit-scrollbar { display:none; }
    .hbtn { background:none; border:none; color:var(--accent); font-size:13px; font-weight:700;
      cursor:pointer; padding:5px 6px; border-radius:7px; -webkit-tap-highlight-color:transparent;
      white-space:nowrap; flex-shrink:0; }
    .seg-btn { background:none; border:1.5px solid var(--accent); color:var(--accent);
      font-size:11px; font-weight:700; cursor:pointer; padding:4px 8px; border-radius:7px;
      -webkit-tap-highlight-color:transparent; white-space:nowrap; flex-shrink:0; }
    .seg-btn.active { background:var(--accent); color:#000; }
    #add-btn { background:var(--accent); color:#000; border-radius:8px; padding:5px 8px; }
    #back-btn { font-size:14px; padding:4px 0; }
    #detail-date { flex:1; font-size:10px; color:var(--muted); text-align:center; }
    #del-note-btn { color:var(--danger); }
    #save-btn { background:var(--accent); color:#000; border-radius:8px; font-size:12px; padding:5px 10px; }

    /* ── SEARCH ── */
    #search-wrap { padding:6px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
    #search-filter-bar, #category-filter-bar { display:none; align-items:center; gap:8px; padding:6px 12px;
      border-bottom:1px solid var(--border); flex-shrink:0; }
    #search-filter-bar.show, #category-filter-bar.show { display:flex; }
    #search-filter-label, #category-filter-label { flex:1; display:flex; align-items:center; gap:6px; min-width:0;
      overflow:hidden; }
    #search-filter-prefix, #category-filter-prefix { font-size:12px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
    #search-filter-text, #category-filter-name { font-size:10px; color:var(--accent); background:rgba(255,214,10,.1);
      border:1px solid rgba(255,214,10,.3); border-radius:6px; padding:2px 8px; font-weight:700;
      flex:0 1 auto; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #search-filter-clear, #category-filter-clear { background:none; border:none; color:var(--muted); font-size:12px;
      cursor:pointer; padding:2px 4px; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
    #search { width:100%; background:var(--hover); border:none; border-radius:7px;
      color:var(--text); padding:6px 12px; font-size:13px; outline:none; -webkit-appearance:none; }
    #search::placeholder { color:var(--muted); }

    /* ── SORT BAR ── */
    #sort-bar { display:flex; align-items:center; gap:6px; padding:5px 10px;
      border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
    .sort-btn { background:none; border:1px solid var(--border); border-radius:6px;
      color:var(--muted); font-size:11px; padding:3px 8px; cursor:pointer; white-space:nowrap;
      -webkit-tap-highlight-color:transparent; flex-shrink:0; }
    .sort-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(255,214,10,.08); }
    #sort-bar-label { font-size:11px; color:var(--muted); flex-shrink:0; }

    /* ── LIST ── */
    #list-view { display:flex; flex-direction:column; flex:1; overflow:hidden; }
    #note-list { list-style:none; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }

    .note-row {
      display:flex; align-items:center;
      min-height:var(--row-min-h);
      padding:0 10px;
      gap:6px; border-bottom:1px solid var(--border); cursor:pointer;
      -webkit-tap-highlight-color:transparent; user-select:none; transition:background .1s;
      touch-action:pan-y;
    }
    .note-row:active { background:var(--hover); }
    .note-row.dragging { opacity:.35; background:var(--hover); }
    .note-row.drag-over-top    { border-top:2px solid var(--accent); }
    .note-row.drag-over-bottom { border-bottom:2px solid var(--accent); }
    .note-row.sort-mode { touch-action:none; background:rgba(255,214,10,.04); }
    .note-row.pinned-row { background:rgba(255,214,10,.06); }

    .drag-handle { color:var(--muted); font-size:16px; flex-shrink:0;
      cursor:grab; padding:0 2px; display:none; }
    .note-row.sort-mode .drag-handle { display:block; }

    .pin-icon { font-size:11px; flex-shrink:0; color:var(--accent); }
    .row-icon  { font-size:13px; flex-shrink:0; }
    .row-title { flex:1; font-size:var(--list-fs); font-weight:500;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row-date  { font-size:10px; color:var(--muted); flex-shrink:0; }
    .row-del   { background:none; border:none; color:var(--muted); font-size:18px;
      cursor:pointer; padding:0 3px; line-height:1; flex-shrink:0;
      -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
    .note-row.sort-mode .row-date { display:none; }
    #empty-msg { color:var(--muted); font-size:13px; text-align:center; padding:40px 16px; }

    /* ── DETAIL ── */
    #detail-view { display:none; flex-direction:column; flex:1; overflow:hidden; }
    #detail-view.active { display:flex; }
    #editor { display:flex; flex-direction:column; flex:1;
      padding:14px 16px calc(14px + var(--safe-bottom)); gap:10px; overflow:hidden; }
    #note-title { background:transparent; border:none; border-bottom:1px solid var(--border);
      outline:none; color:var(--text); font-size:calc(var(--editor-fs) + 5px); font-weight:700;
      font-family:inherit; padding-bottom:8px; width:100%; }
    #note-body  { flex:1; background:transparent; border:none; outline:none; color:var(--text);
      font-size:var(--editor-fs); line-height:var(--editor-lh,1.45); font-family:inherit; resize:none; width:100%; }
    #note-title::placeholder,#note-body::placeholder { color:var(--muted); }


    /* ── SETTINGS MODAL ── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6);
      display:flex; align-items:flex-end; justify-content:center; z-index:100; }
    .modal-bg.hidden { display:none; }
    .modal { background:var(--hd); border-radius:18px 18px 0 0; width:100%; max-width:480px;
      padding:18px 18px calc(18px + var(--safe-bottom)); max-height:80vh; overflow-y:auto; }
    .modal h2 { font-size:15px; font-weight:700; margin-bottom:16px; text-align:center; }
    .modal-row { display:flex; align-items:center; padding:10px 0;
      border-bottom:1px solid var(--border); gap:10px; flex-wrap:wrap; }
    .modal-row:last-child { border-bottom:none; }
    .modal-label { font-size:13px; white-space:nowrap; }
    .modal-row input[type=range] { flex:1; accent-color:var(--accent); min-width:80px; }
    .modal-row .val { font-size:12px; color:var(--accent); min-width:34px; text-align:right; }
    .toggle-switch { position:relative; display:inline-block; width:42px; height:24px; flex-shrink:0; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:var(--hover); border-radius:24px;
      cursor:pointer; transition:background .2s; }
    .toggle-slider::before { content:""; position:absolute; width:18px; height:18px; left:3px; top:3px;
      background:#fff; border-radius:50%; transition:transform .2s; }
    .toggle-switch input:checked + .toggle-slider { background:var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform:translateX(18px); }
    .modal-close { width:100%; margin-top:14px; padding:11px; background:var(--hover);
      border:none; border-radius:10px; color:var(--text); font-size:14px; font-weight:600; cursor:pointer; }
    .modal-btn { flex:1; padding:10px 6px; border:none; border-radius:8px; font-size:12px;
      font-weight:600; cursor:pointer; -webkit-tap-highlight-color:transparent; min-width:80px; }
    .modal-btn.export { background:var(--accent); color:#000; }
    .modal-btn.import { background:var(--hover); color:var(--text); }
    .lang-btn { background:var(--hover); color:var(--text); flex:0 0 auto; min-width:0; font-size:11px; padding:7px 10px; }
    .lang-btn.active { background:var(--accent); color:#000; }
    .modal-section-title { font-size:13px; color:var(--text); white-space:nowrap; flex-shrink:0; }
    .io-group { display:flex; gap:6px; flex-wrap:wrap; width:100%; }
    .io-group .modal-btn { min-width:calc(50% - 3px); flex:1 1 calc(50% - 3px); }
    .io-row { display:flex; gap:6px; flex-wrap:nowrap; flex:1; min-width:0; }
    .io-row .modal-btn { flex:1; min-width:0; padding:7px 4px; }

    /* （並替／検索／カテゴリボタンは .seg-btn に統一） */

    /* ── カテゴリ ── */
    .row-category { font-size:10px; color:var(--accent); background:rgba(255,214,10,.1);
      border:1px solid rgba(255,214,10,.3); border-radius:5px; padding:1px 5px; flex-shrink:0;
      white-space:nowrap; max-width:80px; overflow:hidden; text-overflow:ellipsis; }
    .note-row.sort-mode .row-category { display:none; }
    #note-category { background:transparent; border:none; border-bottom:1px solid var(--border);
      outline:none; color:var(--accent); font-size:12px; font-family:inherit;
      padding-bottom:6px; width:100%; }
    #note-category::placeholder { color:var(--muted); }
    #category-field-wrap { position:relative; }
    #category-suggest { position:absolute; top:100%; left:5ch; right:10px; margin-top:2px;
      background:rgba(255,214,10,.1); border:1px solid rgba(255,214,10,.3); border-radius:5px; z-index:50;
      max-height:160px; overflow-y:auto; font-size:12px; line-height:1.1;
      display:none; box-shadow:0 4px 12px rgba(0,0,0,.35); backdrop-filter:blur(6px); }
    #category-suggest.show { display:block; }
    .cat-suggest-item { display:block; width:100%; text-align:left; padding:4px 8px;
      background:none; border:none; color:var(--accent); font-size:12px; line-height:1.1;
      cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .cat-suggest-item:active, .cat-suggest-item:hover { background:rgba(255,214,10,.2); }
    .cat-option { display:block; width:100%; text-align:left; padding:9px 10px; margin-bottom:6px;
      border:1px solid var(--border); border-radius:8px; background:none; color:var(--text);
      font-size:13px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .cat-option.active { border-color:var(--accent); color:var(--accent); background:rgba(255,214,10,.08); }

    /* ── トースト通知 ── */
    #toast { position:fixed; left:50%; bottom:calc(20px + var(--safe-bottom));
      transform:translateX(-50%) translateY(20px);
      background:var(--hd); color:var(--text); border:1px solid var(--border); border-radius:10px;
      padding:10px 18px; font-size:13px; box-shadow:0 4px 16px rgba(0,0,0,.4); z-index:200;
      opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
      max-width:88vw; text-align:center; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* 長押しヒント */
    #longpress-hint { font-size:10px; color:var(--muted); text-align:center;
      padding:3px 0 2px; flex-shrink:0; display:none; }
    #longpress-hint.show { display:block; }
  </style>
</head>
<body>
<div id="app">

  <!-- LIST VIEW -->
  <div id="list-view">
    <header>
      <span id="header-title">📝 メモ帳</span>
      <div id="header-actions">
        <button class="seg-btn" id="sort-toggle">並替</button><button class="seg-btn" id="search-toggle">検索</button><button class="seg-btn" id="category-btn">カテゴリ</button>
        <button class="hbtn" id="settings-btn">⚙️</button>
        <button class="hbtn" id="add-btn">＋ 新規</button>
      </div>
    </header>
    <div id="search-wrap" style="display:none">
      <input id="search" type="search" placeholder="🔍 検索…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div id="search-filter-bar">
      <span id="search-filter-label"><span id="search-filter-prefix">🔍 検索中の文字：</span><span id="search-filter-text"></span></span>
      <button id="search-filter-clear">✕ 解除</button>
    </div>
    <div id="category-filter-bar">
      <span id="category-filter-label"><span id="category-filter-prefix">📁 表示中のカテゴリ：</span><span id="category-filter-name"></span></span>
      <button id="category-filter-clear">✕ 解除</button>
    </div>
    <!-- ソートバー -->
    <div id="sort-bar" style="display:none">
      <span id="sort-bar-label">並順:</span>
      <button class="sort-btn" id="sb-manual">手動</button>
      <button class="sort-btn" id="sb-date-toggle">日時↓</button>
      <button class="sort-btn" id="sb-title-toggle">題名↓</button>
    </div>
    <div id="longpress-hint">≡ ドラッグして並べ替え　／　「完了」で終了</div>
    <ul id="note-list"></ul>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <header>
      <button class="hbtn" id="back-btn">← 一覧</button>
      <span id="detail-date"></span>
      <button class="hbtn" id="pin-btn">📌</button>
      <button class="hbtn" id="editor-settings-btn">⚙️</button>
      <button class="hbtn" id="save-btn">💾 保存</button>
      <button class="hbtn" id="del-note-btn">削除</button>
    </header>
    <div id="editor">
      <input id="note-title" type="text" placeholder="ここに題名を書いてください">
      <div id="category-field-wrap">
        <input id="note-category" type="text" placeholder="カテゴリ（未入力の場合は「カテゴリなし」）" autocomplete="off">
        <div id="category-suggest"></div>
      </div>
      <textarea id="note-body" placeholder="ここに書き始めてください…"></textarea>
    </div>
  </div>

  <!-- EDITOR SETTINGS MODAL（フォントサイズ・行間）-->
  <div class="modal-bg hidden" id="editor-settings-modal-bg">
    <div class="modal">
      <h2 id="editor-settings-title">🔤 文字設定</h2>
      <div class="modal-row">
        <span class="modal-label" id="editor-fs-label">フォントサイズ</span>
        <input type="range" id="editor-fs-range" min="10" max="26" step="1" value="18">
        <span class="val" id="editor-fs-val">18px</span>
      </div>
      <div class="modal-row">
        <span class="modal-label" id="editor-lh-label">行間</span>
        <input type="range" id="editor-lh-range" min="1.0" max="2.2" step="0.05" value="1.6">
        <span class="val" id="editor-lh-val">1.60</span>
      </div>
      <button class="modal-close" id="editor-settings-modal-close">閉じる</button>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-bg hidden" id="modal-bg">
    <div class="modal">
      <h2 id="settings-title">⚙️ 設定</h2>
      <div class="modal-row">
        <span class="modal-label" id="language-label">Language/日本語</span>
        <div class="io-group lang-group" style="justify-content:flex-end">
          <button class="modal-btn lang-btn" id="lang-ja" data-lang="ja">日本語 (JP)</button>
          <button class="modal-btn lang-btn" id="lang-en" data-lang="en">English (EN)</button>
          <button class="modal-btn lang-btn" id="lang-es" data-lang="es">Español (ES)</button>
          <button class="modal-btn lang-btn" id="lang-pt" data-lang="pt">Português (PT)</button>
          <button class="modal-btn lang-btn" id="lang-ko" data-lang="ko">한국어 (KO)</button>
          <button class="modal-btn lang-btn" id="lang-id" data-lang="id">Bahasa Indonesia (ID)</button>
          <button class="modal-btn lang-btn" id="lang-zh" data-lang="zh">繁體中文 (TW)</button>
          <button class="modal-btn lang-btn" id="lang-th" data-lang="th">ไทย (TH)</button>
          <button class="modal-btn lang-btn" id="lang-vi" data-lang="vi">Tiếng Việt (VI)</button>
          <button class="modal-btn lang-btn" id="lang-de" data-lang="de">Deutsch (DE)</button>
          <button class="modal-btn lang-btn" id="lang-hi" data-lang="hi">हिन्दी (HI)</button>
          <button class="modal-btn lang-btn" id="lang-fr" data-lang="fr">Français (FR)</button>
        </div>
      </div>
      <div class="modal-row">
        <span class="modal-label" id="list-fs-label">一覧のフォントサイズ</span>
        <input type="range" id="list-fs-range" min="10" max="22" step="1" value="18">
        <span class="val" id="list-fs-val">18px</span>
      </div>
      <div class="modal-row">
        <span class="modal-label" id="list-lh-label">一覧の行間</span>
        <input type="range" id="list-lh-range" min="1.4" max="3.0" step="0.1" value="1.8">
        <span class="val" id="list-lh-val">1.8</span>
      </div>
      <div class="modal-row">
        <span class="modal-label" id="date-field-setting-label">一覧で使う日時</span>
        <div class="io-row">
          <button class="modal-btn lang-btn" id="date-field-created">作成日時</button>
          <button class="modal-btn lang-btn" id="date-field-updated">更新日時</button>
        </div>
      </div>
      <div class="modal-row">
        <span class="modal-label" id="show-date-label">一覧に日時を表示</span>
        <label class="toggle-switch">
          <input type="checkbox" id="show-date-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="modal-row">
        <span class="modal-section-title" id="export-label">📤 書き出し</span>
        <div class="io-row">
          <button class="modal-btn export" id="csv-export-btn">CSV</button>
          <button class="modal-btn export" id="json-export-btn">JSON</button>
          <button class="modal-btn export" id="html-export-btn">HTML</button>
        </div>
      </div>
      <div class="modal-row">
        <span class="modal-section-title" id="import-label">📥 取り込み</span>
        <div class="io-row">
          <button class="modal-btn import" id="csv-import-btn">CSV</button>
          <button class="modal-btn import" id="json-import-btn">JSON</button>
          <button class="modal-btn import" id="html-import-btn">HTML</button>
        </div>
        <input type="file" id="csv-import" accept=".csv" style="display:none">
        <input type="file" id="json-import" accept=".json" style="display:none">
        <input type="file" id="html-import" accept=".html,.htm" style="display:none">
      </div>
      <button class="modal-close" id="modal-close">閉じる</button>
    </div>
  </div>

  <!-- CATEGORY MODAL -->
  <div class="modal-bg hidden" id="category-modal-bg">
    <div class="modal">
      <h2 id="category-modal-title">📁 カテゴリで絞り込み</h2>
      <div id="category-option-list"></div>
      <button class="modal-close" id="category-modal-close">閉じる</button>
    </div>
  </div>

</div>
<div id="toast"></div>
<script>
"use strict";
const STORAGE_KEY  = "memo-pwa-notes";
const SETTINGS_KEY = "memo-pwa-settings";

// ── i18n ──────────────────────────────────────────────────
let currentLang = "ja"; // "ja" | "en" | "es" | "pt" | "ko" | "id" | "zh" | "th" | "vi" | "de" | "hi" | "fr"
const I18N = {
  ja: {
    appTitle: "📝 メモ帳",
    appTabTitle: "メモ帳",
    sortBtn: "並替",
    doneBtn: "完了",
    searchBtn: "検索",
    categoryBtn: "カテゴリ",
    newBtn: "＋ 新規",
    searchPlaceholder: "🔍 検索…",
    categoryFilterPrefix: "📁 表示中のカテゴリ：",
    categoryFilterClear: "✕ 解除",
    searchFilterPrefix: "🔍 検索中の文字：",
    sortBarLabel: "並順:",
    sortManual: "手動",
    sortDateDesc: "日時↓",
    sortDateAsc: "日時↑",
    sortTitleDesc: "題名↓",
    sortTitleAsc: "題名↑",
    longpressHint: "≡ ドラッグして並べ替え　／　「完了」で終了",
    emptyFiltered: "一致するメモがありません",

// ── State ─────────────────────────────────────────────────
let notes     = [];
let currentId = null;
let sortMode  = false;   // 手動並び替えモード
let searchMode = false;  // 検索入力モード（検索ボタンで開閉）
let dragEl    = null;
let autoSortKey = "manual"; // "manual"|"date-desc"|"date-asc"|"title-desc"|"title-asc"
let categoryFilter = null; // null=すべて／""=カテゴリなし／それ以外=カテゴリ名
let dateField = "updatedAt"; // "updatedAt"|"createdAt" ─ 一覧表示・ソートに使う日時項目

// ── Storage ───────────────────────────────────────────────
function load() {
  try { notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { notes = []; }
  // pinned／category フィールドが無い古いデータに対応
  notes.forEach(n => {
    if (n.pinned === undefined) n.pinned = false;
    if (n.category === undefined || n.category === null) n.category = "";
    if (!n.createdAt) n.createdAt = n.updatedAt || new Date().toISOString();
    if (n.fontSize === undefined || n.fontSize === null || isNaN(+n.fontSize)) n.fontSize = 18;
    if (n.lineHeight === undefined || n.lineHeight === null || isNaN(+n.lineHeight)) n.lineHeight = 1.6;
  });
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); } catch {}
}
let listLhMult  = 2.0;   // 一覧の行間倍率（フォントサイズに対する行の高さの倍率）
let showDateEnabled = true;

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
    currentLang = ["en","es","pt","ko","id","zh","th","vi","de","hi","fr"].includes(s.lang) ? s.lang : "ja";
    applyListFs(s.listFs   || 18);
    applyEditorFs(s.editorFs || 18);
    applyListLh(s.listLh   || 1.8);
    applyEditorLh(s.editorLh || 1.6);
    showDateEnabled = s.showDate !== false; // 未設定時は表示する
    showDateToggle.checked = showDateEnabled;
    dateField = s.dateField === "createdAt" ? "createdAt" : "updatedAt";
    updateDateFieldButtons();
    if (s.autoSortKey) setAutoSort(s.autoSortKey, false);
  } catch {}
  applyLanguage();
}
function saveSettings() {
  const lfs = +listFsRange.value;
  const efs = +editorFsRange.value;
  const llh = +listLhRange.value;
  const elh = +editorLhRange.value;
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      listFs:lfs, editorFs:efs, listLh:llh, editorLh:elh,
      showDate:showDateEnabled, autoSortKey, lang:currentLang, dateField
    }));
  } catch {}
}

function applyListFs(v) {
  const vv = +v;
  document.documentElement.style.setProperty("--list-fs", vv + "px");
  listFsRange.value = vv;
  listFsVal.textContent = vv + "px";
  updateRowMinHeight();
}
function applyEditorFs(v) {
  document.documentElement.style.setProperty("--editor-fs", v + "px");
  editorFsRange.value = v;
  editorFsVal.textContent = v + "px";
}
function applyListLh(v) {
  listLhMult = +v;
  listLhRange.value = listLhMult;
  listLhVal.textContent = listLhMult.toFixed(1);
  updateRowMinHeight();
}
function applyEditorLh(v) {
  const vv = +v;
  document.documentElement.style.setProperty("--editor-lh", vv);
  editorLhRange.value = vv;
  editorLhVal.textContent = vv.toFixed(2);
}
function updateRowMinHeight() {
  // 行の最小高さ = フォントサイズ × 行間倍率（上下余白を含む自然な高さ）
  const vv = +listFsRange.value;
  const minH = Math.round(vv * listLhMult);
  document.documentElement.style.setProperty("--row-min-h", minH + "px");
}

// ── Capacitorアプリ内（APK化後）での書き出し ───────────────
// @capacitor/filesystem と @capacitor/share を android プロジェクトに追加すると、
// ビルドやHTML側の追加変更なしに、この経路が自動的に使われるようになります。
// （プラグイン未導入の場合は false を返し、下のWeb標準APIにフォールバックします）
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(String(reader.result).split(",")[1] || "");
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
async function exportViaCapacitor(blob, filename) {
  try {
    const plugins = (window.Capacitor && window.Capacitor.Plugins) || {};
    const { Filesystem, Share } = plugins;
    if (!Filesystem) return false; // @capacitor/filesystem 未導入
    const base64 = await blobToBase64(blob);
    const result = await Filesystem.writeFile({ path: filename, data: base64, directory: "CACHE" });
    if (Share && Share.share) {
      await Share.share({ title: filename, url: result.uri, dialogTitle: filename });
    }
    showToast(t("exportSuccessShare")(filename));
    return true;
  } catch (err) {
    console.error("Capacitor経由の書き出しに失敗:", err);
    return false;
  }
}

// ── 書き出し（保存先の選択に対応）─────────────────────────
// 0) Capacitorアプリ内で対応プラグインが使える場合 → ネイティブの共有シートで保存先を選べる
// 1) File System Access API が使える環境（PC版 Chrome/Edge 等）→ 保存先を選べるダイアログを表示
// 2) それ以外で共有シートが使える環境（Android Chrome／iOSのホーム画面PWA等）→ 共有シートから保存先を選べる
// 3) どちらも使えない場合 → 従来のダウンロード方式（ブラウザの既定のダウンロード先に保存）
async function exportFile(blob, filename, accept) {
  if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
    const ok = await exportViaCapacitor(blob, filename);
    if (ok) return;
    // プラグイン未導入・失敗時は下のWeb標準APIへフォールバック
  }
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: filename, accept }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      showToast(t("exportSuccessShare")(filename));
      return;
    } catch (err) {
      if (err && err.name === "AbortError") return; // ユーザーがキャンセル
      // 失敗した場合は下のフォールバックへ続行
    }
  }
  if (navigator.canShare) {
    try {
      const file = new File([blob], filename, {type: blob.type});
      if (navigator.canShare({files:[file]})) {
        await navigator.share({files:[file], title: filename});
        showToast(t("exportSuccessShare")(filename));
        return;
      }
    } catch (err) {
      if (err && err.name === "AbortError") return; // ユーザーがキャンセル
      // 失敗した場合は下のフォールバックへ続行
    }
  }
  try {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast(t("exportSuccessDownload")(filename));
  } catch (err) {
    alert(t("exportFail")(err.message));
  }
}

// ── Auto-sort ─────────────────────────────────────────────
function setAutoSort(key, doRender = true) {
  autoSortKey = key;
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  if (key === "manual") document.getElementById("sb-manual").classList.add("active");
  if (doRender) renderList();
}

function getSortedList(list) {
  const pinned    = list.filter(n => n.pinned);
  const unpinned  = list.filter(n => !n.pinned);
  function cmp(a, b) {
    if (autoSortKey === "date-desc")  return new Date(dispDate(b)) - new Date(dispDate(a));
    if (autoSortKey === "date-asc")   return new Date(dispDate(a)) - new Date(dispDate(b));
    if (autoSortKey === "title-desc") return b.title.localeCompare(a.title, "ja");
    if (autoSortKey === "title-asc")  return a.title.localeCompare(b.title, "ja");
    return 0; // manual: 元の順を保持
  }
  const sortedPinned   = autoSortKey !== "manual" ? [...pinned].sort(cmp)   : pinned;
  const sortedUnpinned = autoSortKey !== "manual" ? [...unpinned].sort(cmp) : unpinned;
  return [...sortedPinned, ...sortedUnpinned];
}

document.getElementById("sb-manual").addEventListener("click", () => { setAutoSort("manual"); saveSettings(); });

// ── Render list（仮想DOM差分なし・軽量DOM再構築）─────────
let _lastListKey = "";
function renderList() {
  const q    = searchEl.value.toLowerCase();
  let base = sortMode
    ? [...notes]
    : notes.filter(n => n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q));
  if (!sortMode && categoryFilter !== null) {
    base = base.filter(n => (n.category||"").trim() === categoryFilter);
  }
  const list = getSortedList(base);

  // 変化がなければスキップ
  const key = list.map(n => n.id + ":" + n.createdAt + ":" + n.updatedAt + ":" + n.pinned + ":" + n.category).join("|") +
              "|sm:" + sortMode + "|q:" + q + "|cf:" + categoryFilter + "|df:" + dateField;
  if (key === _lastListKey) return;
  _lastListKey = key;

  // DocumentFragment で一括挿入
  const frag = document.createDocumentFragment();
  if (list.length === 0) {
    const li = document.createElement("li");
    li.id = "empty-msg";
    li.style.cssText = "color:var(--muted);font-size:13px;text-align:center;padding:40px 16px";
    li.textContent = (q || categoryFilter !== null) ? t("emptyFiltered") : t("emptyAll");
    frag.appendChild(li);
  } else {
    list.forEach(n => frag.appendChild(buildRow(n)));
  }
  noteList.textContent = ""; // innerHTMLより高速
  noteList.appendChild(frag);
}

function buildRow(n) {
  const li = document.createElement("li");
  li.className = "note-row" + (sortMode ? " sort-mode" : "") + (n.pinned ? " pinned-row" : "");
  li.dataset.id = n.id;

  // ドラッグハンドル
  const handle = document.createElement("span");
  handle.className = "drag-handle";
  handle.textContent = "≡";
  li.appendChild(handle);

  // ピンアイコン
  if (n.pinned) {
    const pi = document.createElement("span");
    pi.className = "pin-icon";
    pi.textContent = "📌";
    li.appendChild(pi);
  }

  // 本文アイコン
  const icon = document.createElement("span");
  icon.className = "row-icon";
  icon.textContent = "📄";
  li.appendChild(icon);

  // タイトル
  const rowTitle = document.createElement("span");
  rowTitle.className = "row-title";
  const titleText = (n.title && n.title.trim()) ? n.title : "";
  const bodyPreview = (n.body||"").trim().substring(0,40);
  rowTitle.textContent = titleText || bodyPreview || "";
  li.appendChild(rowTitle);

  if (!sortMode) {
    // カテゴリタグ（カテゴリが設定されているメモのみ表示）
    if ((n.category||"").trim()) {
      const rowCat = document.createElement("span");
      rowCat.className = "row-category";
      rowCat.textContent = n.category.trim();
      li.appendChild(rowCat);
    }

    // 日時（設定でオンオフ可能）
    if (showDateEnabled) {
      const rowDate = document.createElement("span");
      rowDate.className = "row-date";
      rowDate.textContent = fmt(dispDate(n));
      li.appendChild(rowDate);
    }

    li.addEventListener("click", rowClickHandler);
    setupLongPress(li);
  } else {
    // 削除ボタン（並べ替えモード時のみ右側に表示）
    const delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "row-del";
    delBtn.dataset.id = n.id;
    delBtn.setAttribute("aria-label", t("deleteAriaLabel"));
    delBtn.textContent = "×";
    let delHandled = false;
    const doDelete = e => {
      e.preventDefault();
      e.stopPropagation();
      if (delHandled) return; // touchend と click の二重発火を防止
      delHandled = true;
      setTimeout(() => { delHandled = false; }, 500);
      const id = Number(delBtn.dataset.id);
      if (!confirm(t("confirmDeleteNote"))) return;
      notes = notes.filter(x => x.id !== id);
      save();
      _lastListKey = "";
      renderList();
    };
    delBtn.addEventListener("touchend", doDelete, {passive:false});
    delBtn.addEventListener("click", doDelete);
    li.appendChild(delBtn);

    setupDrag(li);
  }
  return li;
}

// ── Drag & Drop (touch + mouse) ───────────────────────────
function setupDrag(li) {
  const handle = li.querySelector(".drag-handle");

  handle.addEventListener("touchstart", e => {
    e.preventDefault();
    dragEl = li;
    li.classList.add("dragging");
  }, {passive:false});

  handle.addEventListener("touchmove", e => {
    e.preventDefault();
    if (!dragEl) return;
    const y = e.touches[0].clientY;
    const rows = noteList.querySelectorAll(".note-row");
    rows.forEach(item => item.classList.remove("drag-over-top","drag-over-bottom"));
    for (const item of rows) {
      if (item === dragEl) continue;
      const r = item.getBoundingClientRect();
      if (y >= r.top && y <= r.bottom) {
        item.classList.add(y < r.top + r.height / 2 ? "drag-over-top" : "drag-over-bottom");
        break;
      }
    }
  }, {passive:false});

  handle.addEventListener("touchend", () => {
    if (!dragEl) return;
    const rows = [...noteList.querySelectorAll(".note-row")];
    const overTop    = rows.find(i => i.classList.contains("drag-over-top"));
    const overBottom = rows.find(i => i.classList.contains("drag-over-bottom"));
    const target = overTop || overBottom;
    if (target && target !== dragEl) {
      moveNote(Number(dragEl.dataset.id), Number(target.dataset.id), !!overBottom);
    }
    dragEl.classList.remove("dragging");
    rows.forEach(i => i.classList.remove("drag-over-top","drag-over-bottom"));
    dragEl = null;
    _lastListKey = "";
    renderList();
  }, {passive:false});

  handle.setAttribute("draggable","true");
  handle.addEventListener("dragstart", () => { dragEl = li; li.classList.add("dragging"); });
  li.addEventListener("dragover", e => {
    e.preventDefault();
    noteList.querySelectorAll(".note-row").forEach(i => i.classList.remove("drag-over-top","drag-over-bottom"));
    const r = li.getBoundingClientRect();
    li.classList.add(e.clientY < r.top + r.height/2 ? "drag-over-top" : "drag-over-bottom");
  });
  li.addEventListener("dragleave", () => li.classList.remove("drag-over-top","drag-over-bottom"));
  li.addEventListener("drop", e => {
    e.preventDefault();
    li.classList.remove("drag-over-top","drag-over-bottom");
    if (!dragEl || dragEl === li) { dragEl=null; return; }
    const isBottom = e.clientY >= li.getBoundingClientRect().top + li.getBoundingClientRect().height/2;
    moveNote(Number(dragEl.dataset.id), Number(li.dataset.id), isBottom);
    dragEl = null;
    _lastListKey = "";
    renderList();
  });
  li.addEventListener("dragend", () => { li.classList.remove("dragging"); dragEl=null; });
}

function moveNote(fromId, toId, insertAfter) {
  const fi = notes.findIndex(n => n.id === fromId);
  const ti = notes.findIndex(n => n.id === toId);
  if (fi === -1 || ti === -1) return;
  const [moved] = notes.splice(fi,1);
  const newTi = notes.findIndex(n => n.id === toId);
  notes.splice(insertAfter ? newTi+1 : newTi, 0, moved);
  save();
}

function mergeImported(imported) {
  imported.forEach(n => {
    if (!n.id) n.id = Date.now() + Math.random();
    if (!n.updatedAt) n.updatedAt = new Date().toISOString();
    if (n.pinned === undefined) n.pinned = false;
    if (n.category === undefined || n.category === null) n.category = "";
    if (!n.createdAt) n.createdAt = n.updatedAt || new Date().toISOString();
    if (n.fontSize === undefined || n.fontSize === null || isNaN(+n.fontSize)) n.fontSize = 18;
    if (n.lineHeight === undefined || n.lineHeight === null || isNaN(+n.lineHeight)) n.lineHeight = 1.6;
    const ex = notes.findIndex(x => x.id === n.id);
    if (ex !== -1) notes[ex] = n;
    else notes.unshift(n);
  });
  save();
  _lastListKey = "";
  renderList();
}

// CSV import
document.getElementById("csv-import-btn").addEventListener("click", () => document.getElementById("csv-import").click());
document.getElementById("csv-import").addEventListener("change", function() {
  const file = this.files[0]; if (!file) return;
  readFile(file, "UTF-8", text => {
    try {
      const lines = text.replace(/^\uFEFF/,"").split(/\r?\n/).filter(l=>l.trim());
      const header = parseCSVLine(lines[0]).map(h => h.trim());
      const idx = name => header.indexOf(name);
      const iId = idx("id"), iTitle = idx("title"), iBody = idx("body"),
            iCategory = idx("category"), iCreated = idx("createdAt"),
            iUpdated = idx("updatedAt"), iPinned = idx("pinned");
      const imported = [];
      for (let i=1; i<lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        if (cols.length < 3) continue;
        const updatedAt = (iUpdated!==-1 && cols[iUpdated]) || new Date().toISOString();
        imported.push({
          id: Number(cols[iId]) || Date.now()+i,
          title: (iTitle!==-1 && cols[iTitle]) || "",
          body:  (iBody!==-1 && cols[iBody]) || "",
          category: (iCategory!==-1 && cols[iCategory]) || "",
          createdAt: (iCreated!==-1 && cols[iCreated]) || updatedAt,
          updatedAt: updatedAt,
          pinned: iPinned!==-1 && cols[iPinned]==="1"
        });
      }
      mergeImported(imported);
      alert(t("importedCount")(imported.length));
    } catch(err) { alert(t("csvLoadFail")(err.message)); }
  });
  this.value = "";
});

// JSON import
document.getElementById("json-import-btn").addEventListener("click", () => document.getElementById("json-import").click());
document.getElementById("json-import").addEventListener("change", function() {
  const file = this.files[0]; if (!file) return;
  readFile(file, "UTF-8", text => {
    try {
      let data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error(t("jsonNotArray"));
      mergeImported(data);
      alert(t("importedCount")(data.length));
    } catch(err) { alert(t("jsonLoadFail")(err.message)); }
  });
  this.value = "";
});

// HTML import（このアプリが書き出したHTMLのみ対応）
document.getElementById("html-import-btn").addEventListener("click", () => document.getElementById("html-import").click());
document.getElementById("html-import").addEventListener("change", function() {
  const file = this.files[0]; if (!file) return;
  readFile(file, "UTF-8", text => {
    try {
      const dp = new DOMParser();
      const doc = dp.parseFromString(text, "text/html");
      const arts = doc.querySelectorAll("article");
      if (!arts.length) throw new Error(t("noArticleFound"));
      const imported = [];
      arts.forEach(art => {
        const title      = art.querySelector("h2")?.textContent || "";
        const body       = art.querySelector("pre")?.textContent || "";
        const fallbackDt = art.querySelector("time")?.textContent || new Date().toISOString();
        const updatedAt  = art.querySelector("time.updated")?.textContent || fallbackDt;
        const createdAt  = art.querySelector("time.created")?.textContent || fallbackDt;
        let category    = art.querySelector(".category")?.textContent || "";
        if ([
          "カテゴリなし","Uncategorized","Sin categoría","Sem categoria",
          "미분류","Tanpa kategori","未分類","ไม่มีหมวดหมู่",
          "Chưa phân loại","Ohne Kategorie","बिना श्रेणी","Sans catégorie"
        ].includes(category)) category = "";
        imported.push({id: Date.now()+Math.random(), title, body, category, createdAt, updatedAt, pinned:false});
      });
      mergeImported(imported);
      alert(t("importedCount")(imported.length));
    } catch(err) { alert(t("htmlLoadFail")(err.message)); }
  });
  this.value = "";
});

function readFile(file, enc, cb) {
  const reader = new FileReader();
  reader.onload = e => cb(e.target.result);
  reader.readAsText(file, enc);
}

function parseCSVLine(line) {
  const result=[]; let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){ if(c==='"'&&line[i+1]==='"'){cur+='"';i++;} else if(c==='"'){inQ=false;} else cur+=c; }
    else { if(c==='"'){inQ=true;} else if(c===','){result.push(cur);cur="";} else cur+=c; }
  }
  result.push(cur); return result;
}

// ── 戻るボタン（Android）: いきなり終了せず確認ダイアログを表示 ─
// history.pushState でダミーの履歴を1つ積んでおき、戻る操作のたびに
// popstate をフックしてアプリ内の状態を閉じる → 最後に確認ダイアログを出す。
function pushGuardState() {
  try { history.pushState({ memoGuard: true, t: Date.now() }, "", location.href); } catch {}
}
function tryExitApp() {
  try {
    const plugins = (window.Capacitor && window.Capacitor.Plugins) || {};
    if (plugins.App && plugins.App.exitApp) { plugins.App.exitApp(); return; }
  } catch {}
  try { window.close(); } catch {} // 通常のブラウザタブでは動作しないことがあります
}
function handleBackPress() {
  // 編集画面の文字設定ポップアップが開いていれば、それを閉じるだけ
  if (!editorSettingsModalBg.classList.contains("hidden")) {
    editorSettingsModalBg.classList.add("hidden");
    saveSettings();
    pushGuardState();
    return;
  }
  // 詳細画面が開いていれば、まず一覧に戻るだけにする
  if (detailView.classList.contains("active")) {
    persistEdit();
    showList();
    pushGuardState();
    return;
  }
  // 設定モーダルが開いていれば閉じるだけにする
  if (!modalBg.classList.contains("hidden")) {
    modalBg.classList.add("hidden");
    saveSettings();
    pushGuardState();
    return;
  }
  // カテゴリ絞り込みモーダルが開いていれば閉じるだけにする
  if (!categoryModalBg.classList.contains("hidden")) {
    categoryModalBg.classList.add("hidden");
    pushGuardState();
    return;
  }
  // 並べ替えモード中なら、まずそれを終了する
  if (sortMode) {
    sortToggle.click();
    pushGuardState();
    return;
  }
  // 検索モード中なら、まずそれを終了する
  if (searchMode) {
    searchToggleBtn.click();
    pushGuardState();
    return;
  }
  // 一覧画面のトップ：終了確認ダイアログを表示
  if (confirm(t("confirmExitApp"))) {
    tryExitApp();
  } else {
    pushGuardState();
  }
}
window.addEventListener("popstate", handleBackPress);
// Capacitorでネイティブアプリ化した場合、ハードウェアの戻るボタンは
// backButton イベントとして飛んでくることがあるため、そちらも同じ処理で受ける。
try {
  const capPlugins = (window.Capacitor && window.Capacitor.Plugins) || {};
  if (capPlugins.App && capPlugins.App.addListener) {
    capPlugins.App.addListener("backButton", () => { handleBackPress(); });
  }
} catch {}
