name: PWA to APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. コードのチェックアウト
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Microsoft公式のPWA Builder Actionを実行
    - name: PWABuilder Android Action
      uses: pwa-builder/pwa-starter-action@v1
      with:
        # あなたのGitHub PagesのURLを指定
        url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        # Android版（APK）のみを生成ターゲットにする
        platform: android

    # 3. 生成されたzipファイル（APK同梱）を成果物として保存
    - name: Upload Signing Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pwa-android-apk
        path: ./*_android.zip
