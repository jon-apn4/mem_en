<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="メモ帳">
  <meta name="theme-color" content="#1C1C1E">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>メモ帳</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1C1C1E;
      --hd:     #2C2C2E;
      --row:    #2C2C2E;
      --hover:  #3A3A3C;
      --border: #3A3A3C;
      --accent: #FFD60A;
      --text:   #F2F2F7;
      --muted:  #8E8E93;
      --danger: #FF453A;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: calc(14px + var(--safe-top)) 20px 14px;
      background: var(--hd);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #header-title {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
    }
    #add-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    #detail-date {
      flex: 1;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    #del-note-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── SEARCH ── */
    #search-wrap {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #search {
      width: 100%;
      background: var(--hover);
      border: none;
      border-radius: 8px;
      color: var(--text);
      padding: 9px 14px;
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
    }
    #search::placeholder { color: var(--muted); }

    /* ── LIST ── */
    #list-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #note-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }
    .note-row {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 0 16px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .note-row:active { background: var(--hover); }
    .row-icon { font-size: 15px; flex-shrink: 0; }
    .row-title {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-date { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .row-del {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #empty-msg {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 48px 16px;
    }

    /* ── DETAIL ── */
    #detail-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    #detail-view.active { display: flex; }
    #editor {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      gap: 14px;
      overflow: hidden;
    }
    #note-title {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      font-family: inherit;
      padding-bottom: 10px;
      width: 100%;
    }
    #note-body {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      line-height: 1.85;
      font-family: inherit;
      resize: none;
      width: 100%;
    }
    #note-title::placeholder, #note-body::placeholder { color: var(--muted); }
  </style>
</head>
<body>
<div id="app">

  <!-- LIST VIEW -->
  <div id="list-view">
    <header>
      <span id="header-title">📝 メモ帳</span>
      <button id="add-btn">＋ 新規</button>
    </header>
    <div id="search-wrap">
      <input id="search" type="search" placeholder="🔍  検索…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <ul id="note-list"></ul>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <header>
      <button id="back-btn">← 一覧</button>
      <span id="detail-date"></span>
      <button id="del-note-btn">削除</button>
    </header>
    <div id="editor">
      <input id="note-title" type="text" placeholder="タイトル">
      <textarea id="note-body" placeholder="ここに書き始めてください…"></textarea>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = "memo-pwa-notes";

let notes = [];
let currentId = null;

// ── Storage ──────────────────────────────────────────────────
function load() {
  try { notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { notes = []; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); } catch {}
}

// ── Helpers ──────────────────────────────────────────────────
function fmt(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", {
    month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
  });
}
function makeNote() {
  return { id: Date.now(), title: "無題のメモ", body: "", updatedAt: new Date().toISOString() };
}

// ── Views ────────────────────────────────────────────────────
const listView   = document.getElementById("list-view");
const detailView = document.getElementById("detail-view");
const noteList   = document.getElementById("note-list");
const searchEl   = document.getElementById("search");
const titleEl    = document.getElementById("note-title");
const bodyEl     = document.getElementById("note-body");
const detailDate = document.getElementById("detail-date");

function showList() {
  currentId = null;
  detailView.classList.remove("active");
  listView.style.display = "flex";
  renderList();
}

function showDetail(id) {
  currentId = id;
  const n = notes.find(x => x.id === id);
  if (!n) { showList(); return; }
  listView.style.display = "none";
  detailView.classList.add("active");
  titleEl.value = n.title;
  bodyEl.value  = n.body;
  detailDate.textContent = "最終更新: " + fmt(n.updatedAt);
  titleEl.focus();
}

function renderList() {
  const q = searchEl.value.toLowerCase();
  const filtered = notes.filter(n =>
    n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q)
  );
  noteList.innerHTML = "";
  if (filtered.length === 0) {
    const li = document.createElement("li");
    li.id = "empty-msg";
    li.textContent = q ? "一致するメモがありません" : "メモがありません。＋ で作成してください。";
    noteList.appendChild(li);
    return;
  }
  filtered.forEach(n => {
    const li = document.createElement("li");
    li.className = "note-row";
    li.innerHTML = `
      <span class="row-icon">📄</span>
      <span class="row-title">${esc(n.title)}</span>
      <span class="row-date">${fmt(n.updatedAt)}</span>
      <button class="row-del" data-id="${n.id}" aria-label="削除">×</button>
    `;
    li.addEventListener("click", e => {
      if (e.target.classList.contains("row-del")) return;
      showDetail(n.id);
    });
    noteList.appendChild(li);
  });
}

function esc(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Events ───────────────────────────────────────────────────
document.getElementById("add-btn").addEventListener("click", () => {
  const n = makeNote();
  notes.unshift(n);
  save();
  showDetail(n.id);
});

document.getElementById("back-btn").addEventListener("click", showList);

document.getElementById("del-note-btn").addEventListener("click", () => {
  if (!currentId) return;
  if (!confirm("このメモを削除しますか？")) return;
  notes = notes.filter(n => n.id !== currentId);
  save();
  showList();
});

noteList.addEventListener("click", e => {
  const btn = e.target.closest(".row-del");
  if (!btn) return;
  const id = Number(btn.dataset.id);
  if (!confirm("このメモを削除しますか？")) return;
  notes = notes.filter(n => n.id !== id);
  save();
  renderList();
});

searchEl.addEventListener("input", renderList);

// Auto-save on edit
function autoSave() {
  if (!currentId) return;
  const idx = notes.findIndex(n => n.id === currentId);
  if (idx === -1) return;
  notes[idx].title     = titleEl.value || "無題のメモ";
  notes[idx].body      = bodyEl.value;
  notes[idx].updatedAt = new Date().toISOString();
  detailDate.textContent = "最終更新: " + fmt(notes[idx].updatedAt);
  save();
}
titleEl.addEventListener("input", autoSave);
bodyEl.addEventListener("input",  autoSave);

// ── Init ─────────────────────────────────────────────────────
load();
showList();

// ── Service Worker ───────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}
</script>
</body>
</html>
